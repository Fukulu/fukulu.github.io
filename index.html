<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>FoaltyCoder - Mobile Application Developer</title>
  <style>
    @font-face {
      font-family: 'SpaceMono';
      src: url('assets/Space_Mono/SpaceMono-Bold.ttf') format('truetype');
      font-weight: 700;
      font-style: normal;
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: #141414;
      overflow-x: hidden;
    }

    .container {
      max-width: 100%;
      margin: 0 auto;
      min-height: 100vh;
      position: relative;
      z-index: 1;
    }

    .main-content {
      width: 100%;
      padding: 120px 60px 120px 60px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 60px;
      min-height: 100vh;
      box-sizing: border-box;
    }

    .left-section {
      flex: 1;
      min-width: 0;
      padding-left: 4vw;
    }

    .code-tag {
      font-family: 'SpaceMono', monospace;
      font-size: clamp(13px, 1.1vw, 16px);
      margin-bottom: 28px;
      display: inline-block;
    }

    .code-tag .bracket {
      color: #808080;
    }

    .code-tag .tag-text {
      color: #4ec9b0;
    }

    .hero-title {
      font-family: 'SpaceMono', monospace;
      font-weight: 700;
      font-size: clamp(24px, 3.72vw, 60px);
      color: #ffffff;
      line-height: 1.05;
      letter-spacing: -1px;
      text-transform: uppercase;
    }

    .stats-row {
      display: flex;
      gap: 48px;
      margin-top: 52px;
      flex-wrap: wrap;
    }

    .stat-item {
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    .stat-number {
      font-family: 'SpaceMono', monospace;
      font-size: clamp(36px, 3.6vw, 56px);
      font-weight: 700;
      color: #ffffff;
      line-height: 1;
    }

    .stat-label {
      font-family: 'SpaceMono', monospace;
      font-size: clamp(10px, 0.9vw, 13px);
      line-height: 1.4;
    }

    .stat-label .s-comment  { color: #6a9955; }
    .stat-label .s-property { color: #9cdcfe; }
    .stat-label .s-string   { color: #ce9178; }
    .stat-label .s-bracket  { color: #808080; }

    .right-section {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    .profile-image-wrapper {
      width: min(520px, 42vw);
      height: min(520px, 42vw);
      border-radius: 50%;
      border: 2px solid rgba(255, 255, 255, 0.3);
      overflow: hidden;
      flex-shrink: 0;
    }

    .profile-image {
      width: 100%;
      height: 100%;
      object-fit: cover;
      transition: opacity 0.4s ease;
      filter: grayscale(30%);
    }

    .profile-label {
      margin-top: 20px;
      font-family: 'SpaceMono', monospace;
      font-size: 16px;
      font-weight: 700;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 3px;
      text-transform: uppercase;
      transition: opacity 0.4s ease;
    }

    @media (max-width: 1024px) {
      .main-content {
        flex-direction: column;
        padding: 120px 40px 120px 40px;
        gap: 50px;
      }

      .left-section {
        width: 100%;
        padding-left: 0;
      }

      .right-section {
        width: 100%;
      }

      .profile-image-wrapper {
        width: min(320px, 80vw);
        height: min(320px, 80vw);
      }

      .hero-title {
        font-size: clamp(24px, 7.2vw, 46px);
      }

      .stats-row {
        gap: 28px;
        margin-top: 36px;
      }

      .stat-number {
        font-size: 36px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div id="navbar-container"></div>

    <div class="main-content">
      <div class="left-section">
        <p class="code-tag"><span class="bracket">&lt;</span><span class="tag-text">10+ Years Experience</span><span class="bracket">&gt;</span></p>
        <h1 class="hero-title">BUILDING FAST, SCALABLE, AND SECURE MOBILE APP & WEBSITE</h1>

        <div class="stats-row">
          <div class="stat-item">
            <span class="stat-number">56</span>
            <span class="stat-label">
              <span class="s-bracket">// </span><span class="s-comment">completed</span><br>
              <span class="s-property">projects</span>
            </span>
          </div>
          <div class="stat-item">
            <span class="stat-number">10+</span>
            <span class="stat-label">
              <span class="s-bracket">// </span><span class="s-comment">years in</span><br>
              <span class="s-property">development</span>
            </span>
          </div>
          <div class="stat-item">
            <span class="stat-number">7+</span>
            <span class="stat-label">
              <span class="s-bracket">// </span><span class="s-comment">clients</span><br>
              <span class="s-string">worldwide</span>
            </span>
          </div>
          <div class="stat-item">
            <span class="stat-number">+100K</span>
            <span class="stat-label">
              <span class="s-bracket">// </span><span class="s-comment">users on</span><br>
              <span class="s-string">my built platforms</span>
            </span>
          </div>
        </div>
      </div>

      <div class="right-section">
        <div class="profile-image-wrapper">
          <img id="profileImage" src="assets/designer.png" alt="Profile" class="profile-image">
        </div>
        <span id="profileLabel" class="profile-label">Designer</span>
      </div>
    </div>

    <div id="footer-container"></div>

    <script src="components/loader.js"></script>
    <script>
      const profileImage = document.getElementById('profileImage');
      const profileLabel = document.getElementById('profileLabel');
      let isDeveloper = false;

      function switchImage() {
        profileImage.style.opacity = '0';
        profileLabel.style.opacity = '0';
        setTimeout(() => {
          isDeveloper = !isDeveloper;
          profileImage.src = isDeveloper ? 'assets/coder.png' : 'assets/designer.png';
          profileLabel.textContent = isDeveloper ? 'Developer' : 'Designer';
          profileImage.style.opacity = '1';
          profileLabel.style.opacity = '1';
        }, 400);
      }

      setInterval(switchImage, 3000);
    </script>
</body>
</html>
