<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Deutsch Master - FoaltyCoder</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #141414;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
            padding-bottom: 100px;
        }

.page-header {
            padding: 150px 80px 40px 80px;
            text-align: center;
        }

        .page-title {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;
        }

        .page-subtitle {
            font-size: 24px;
            color: #999;
            font-weight: 400;
            margin-bottom: 40px;
        }

        .store-buttons {
            display: flex;
            gap: 20px;
            justify-content: center;
            margin-bottom: 60px;
        }

        .store-btn {
            display: inline-flex;
            align-items: center;
            gap: 12px;
            background: #fff;
            color: #000;
            padding: 16px 32px;
            border-radius: 12px;
            text-decoration: none;
            font-size: 18px;
            font-weight: 600;
            transition: all 0.3s;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.3);
        }

        .store-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 12px 32px rgba(0, 0, 0, 0.5);
            background: #e0e0e0;
        }

        .store-icon {
            width: 32px;
            height: 32px;
        }

        .supported-languages {
            font-size: 18px;
            color: #999;
            margin-top: 30px;
            line-height: 1.8;
        }

        .supported-languages strong {
            color: #fff;
            font-weight: 700;
        }

        .screenshots-section {
            padding: 0 80px;
            max-width: 1600px;
            margin: 0 auto;
        }

        .carousel-container {
            position: relative;
            overflow-x: auto;
            overflow-y: hidden;
            padding: 40px 0;
            scroll-behavior: smooth;
            scrollbar-width: thin;
            scrollbar-color: rgba(0, 0, 0, 0.3) transparent;
        }

        .carousel-container::-webkit-scrollbar {
            height: 8px;
        }

        .carousel-container::-webkit-scrollbar-track {
            background: transparent;
        }

        .carousel-container::-webkit-scrollbar-thumb {
            background: rgba(0, 0, 0, 0.3);
            border-radius: 4px;
        }

        .carousel-container::-webkit-scrollbar-thumb:hover {
            background: rgba(0, 0, 0, 0.5);
        }

        .carousel-track {
            display: flex;
            gap: 30px;
            width: fit-content;
        }

        .screenshot {
            flex: 0 0 auto;
            width: 280px;
            border-radius: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
            transition: transform 0.3s;
        }

        .screenshot:hover {
            transform: scale(1.05);
        }



@media (max-width: 1024px) {
            .page-header {
                padding: 120px 40px 40px 40px;
            }

            .page-title {
                font-size: 48px;
            }

            .page-subtitle {
                font-size: 18px;
            }

            .screenshots-section {
                padding: 0 40px;
            }

            .screenshot {
                width: 220px;
            }

            .store-buttons {
                flex-direction: column;
                align-items: center;
            }

            .store-btn {
                width: 100%;
                max-width: 300px;
                justify-content: center;
            }


        }
    </style>
</head>
<body>
    <div class="container">
        <div id="navbar-container"></div>

        <div class="page-header">
            <h3 class="page-title">Word Lama</h3>
            
            <div class="store-buttons">
                <a href="https://apps.apple.com/us/app/word-lama/id6741392149" class="store-btn" target="_blank">
                    <svg class="store-icon" viewBox="0 0 24 24" fill="currentColor">
                        <path d="M18.71 19.5c-.83 1.24-1.71 2.45-3.05 2.47-1.34.03-1.77-.79-3.29-.79-1.53 0-2 .77-3.27.82-1.31.05-2.3-1.32-3.14-2.53C4.25 17 2.94 12.45 4.7 9.39c.87-1.52 2.43-2.48 4.12-2.51 1.28-.02 2.5.87 3.29.87.78 0 2.26-1.07 3.81-.91.65.03 2.47.26 3.64 1.98-.09.06-2.17 1.28-2.15 3.81.03 3.02 2.65 4.03 2.68 4.04-.03.07-.42 1.44-1.38 2.83M13 3.5c.73-.83 1.94-1.46 2.94-1.5.13 1.17-.34 2.35-1.04 3.19-.69.85-1.83 1.51-2.95 1.42-.15-1.15.41-2.35 1.05-3.11z"/>
                    </svg>
                    App Store
                </a>
            </div>
            
            <p class="supported-languages">
                <strong>Supported Languages:</strong><br>
                English, Turkish
            </p>
        </div>

        <div class="screenshots-section">
            <div class="carousel-container">
                <div class="carousel-track">
                    <img src="assets/app6/screenshot1.png" alt="Screenshot 1" class="screenshot">
                    <img src="assets/app6/screenshot2.png" alt="Screenshot 2" class="screenshot">
                    <img src="assets/app6/screenshot3.png" alt="Screenshot 3" class="screenshot">
                    <img src="assets/app6/screenshot4.png" alt="Screenshot 4" class="screenshot">
                    <img src="assets/app6/screenshot5.png" alt="Screenshot 5" class="screenshot">
                    <img src="assets/app6/screenshot6.png" alt="Screenshot 6" class="screenshot">
                    <img src="assets/app6/screenshot7.png" alt="Screenshot 7" class="screenshot">
                    <img src="assets/app6/screenshot8.png" alt="Screenshot 8" class="screenshot">
                </div>
            </div>
        </div>
        <div id="footer-container"></div>
    </div>

    <script src="components/loader.js"></script>
</div>

</body>
</html>
