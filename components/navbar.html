<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Navbar Component</title>
    <link rel="icon" type="image/png" sizes="32x32" href="assets/foaltycoderlogo.png">
    <link rel="icon" type="image/png" sizes="16x16" href="assets/foaltycoderlogo.png">
    <link rel="apple-touch-icon" sizes="180x180" href="assets/foaltycoderlogo.png">
    <style>
        @font-face {
            font-family: 'SpaceMono';
            src: url('assets/Space_Mono/SpaceMono-Regular.ttf') format('truetype');
            font-weight: 400;
            font-style: normal;
        }

        @font-face {
            font-family: 'SpaceMono';
            src: url('assets/Space_Mono/SpaceMono-Bold.ttf') format('truetype');
            font-weight: 700;
            font-style: normal;
        }
        .navbar {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: transparent;
            backdrop-filter: none;
            -webkit-backdrop-filter: none;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 30px 40px;
            z-index: 1000;
            border-bottom: 1px solid transparent;
            transition: background 0.3s ease, backdrop-filter 0.3s ease, border-color 0.3s ease;
        }

        .navbar.scrolled {
            background: rgba(20, 20, 20, 0.7);
            backdrop-filter: blur(16px) saturate(180%);
            -webkit-backdrop-filter: blur(16px) saturate(180%);
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        }

        .navbar-logo {
            font-family: 'SpaceMono', monospace;
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            letter-spacing: 1px;
            text-decoration: none;
            transition: opacity 0.3s;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .navbar-logo:hover {
            opacity: 0.7;
        }

        .navbar-logo-img {
            width: 56px;
            height: 56px;
            object-fit: contain;
            flex-shrink: 0;
        }

        @media (max-width: 768px) {
            .navbar-logo-img {
                width: 28px;
                height: 28px;
            }
        }

        .navbar-nav {
            display: flex;
            gap: 45px;
        }

        .navbar-item {
            font-family: 'SpaceMono', monospace;
            text-decoration: none;
            color: #fff;
            font-size: 16px;
            font-weight: 400;
            transition: all 0.3s;
            position: relative;
            padding-bottom: 5px;
        }

        .navbar-item::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 3px;
            background: #fff;
            transform: scaleX(0);
            transition: transform 0.3s;
        }

        .navbar-item:hover::after,
        .navbar-item.active::after {
            transform: scaleX(1);
        }

        .navbar-item:hover {
            opacity: 0.7;
        }

        /* Hamburger Button */
        .navbar-hamburger {
            display: none;
            flex-direction: column;
            justify-content: center;
            gap: 6px;
            width: 36px;
            height: 36px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 4px;
        }

        .navbar-hamburger span {
            display: block;
            width: 100%;
            height: 3px;
            background: #fff;
            border-radius: 2px;
            transition: all 0.3s ease;
            transform-origin: center;
        }

        /* Hamburger → X animation */
        .navbar-hamburger.open span:nth-child(1) {
            transform: translateY(9px) rotate(45deg);
        }

        .navbar-hamburger.open span:nth-child(2) {
            opacity: 0;
            transform: scaleX(0);
        }

        .navbar-hamburger.open span:nth-child(3) {
            transform: translateY(-9px) rotate(-45deg);
        }

        /* Mobile Menu Dropdown */
        .navbar-mobile-menu {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            background: rgba(20, 20, 20, 0.95);
            backdrop-filter: blur(20px) saturate(180%);
            -webkit-backdrop-filter: blur(20px) saturate(180%);
            padding: 100px 40px 40px 40px;
            z-index: 999;
            flex-direction: column;
            gap: 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.08);
            transform: translateY(-100%);
            transition: transform 0.35s ease;
        }

        .navbar-mobile-menu.open {
            transform: translateY(0);
        }

        .navbar-mobile-item {
            font-family: 'SpaceMono', monospace;
            text-decoration: none;
            color: #fff;
            font-size: 22px;
            font-weight: 400;
            transition: opacity 0.3s;
        }

        .navbar-mobile-item:hover {
            opacity: 0.6;
        }

        .navbar-mobile-item.active {
            border-left: 4px solid #fff;
            padding-left: 16px;
        }

        @media (max-width: 768px) {
            .navbar {
                padding: 20px 24px;
            }

            .navbar-logo {
                font-size: 24px;
            }

            .navbar-nav {
                display: none;
            }

            .navbar-hamburger {
                display: flex;
            }

            .navbar-mobile-menu {
                display: flex;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="index.html" class="navbar-logo">
            <img src="assets/foaltycoderlogo.png" alt="FoaltyCoder" class="navbar-logo-img">
            FoaltyCoder
        </a>
        <div class="navbar-nav">
            <a href="projects.html" class="navbar-item">Projects</a>
            <a href="designs.html" class="navbar-item">Designs</a>
            <a href="privacy.html" class="navbar-item">Privacy</a>
            <a href="terms.html" class="navbar-item">Terms</a>
            <a href="support.html" class="navbar-item">Support</a>
        </div>
        <button class="navbar-hamburger" id="hamburgerBtn" aria-label="Menu">
            <span></span>
            <span></span>
            <span></span>
        </button>
    </nav>

    <div class="navbar-mobile-menu" id="mobileMenu">
        <a href="projects.html" class="navbar-mobile-item">Projects</a>
        <a href="designs.html" class="navbar-mobile-item">Designs</a>
        <a href="privacy.html" class="navbar-mobile-item">Privacy</a>
        <a href="terms.html" class="navbar-mobile-item">Terms</a>
        <a href="support.html" class="navbar-mobile-item">Support</a>
    </div>

    <script>
        const hamburgerBtn = document.getElementById('hamburgerBtn');
        const mobileMenu = document.getElementById('mobileMenu');
        const navbar = document.querySelector('.navbar');

        // Scroll-triggered blur effect
        function updateNavbarScroll() {
            if (window.scrollY > 10) {
                navbar.classList.add('scrolled');
            } else {
                navbar.classList.remove('scrolled');
            }
        }
        window.addEventListener('scroll', updateNavbarScroll, { passive: true });
        updateNavbarScroll();

        // Hamburger toggle
        hamburgerBtn.addEventListener('click', function() {
            this.classList.toggle('open');
            mobileMenu.classList.toggle('open');
        });

        // Close menu when a link is clicked
        mobileMenu.querySelectorAll('.navbar-mobile-item').forEach(item => {
            item.addEventListener('click', () => {
                hamburgerBtn.classList.remove('open');
                mobileMenu.classList.remove('open');
            });
        });
    </script>
</body>
</html>
