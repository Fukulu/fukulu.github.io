    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #141414;
            overflow-x: hidden;
        }

        .container {
            max-width: 100%;
            margin: 0 auto;
            min-height: 100vh;
            position: relative;
        }

        .page-header {
            padding: 150px 80px 60px 80px;
            text-align: center;

        .page-title {
            font-size: 64px;
            font-weight: 900;
            color: #fff;
            margin-bottom: 20px;

        .designs-container {
            padding: 0 80px 120px 80px;
        }

        .design-project {

        }

        .project-title {
            font-size: 32px;
            font-weight: 700;
            color: #fff;
            margin-bottom: 40px;
            text-align: center;
        }

        .carousel-container {
            position: relative;
            width: 100%;
            max-width: 1440px;
            overflow: hidden;
            margin: 0 auto;
        }


        .carousel-container::after {
            content: '';
            position: absolute;
            bottom: 0;
            left: 0;
            right: 0;
            height: 120px;
            background: linear-gradient(to top, rgba(0,0,0,0.3), transparent);
            pointer-events: none;
            z-index: 4;
        }
        
        .carousel-wrapper {
            display: flex;
            transition: transform 0.6s ease;
            touch-action: pan-y;
        }
        
        .design-slide {
            min-width: 100%;
            height: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        
        .design-image {
            width: 100%;
            height: auto;
            display: block;
        }
        
        .carousel-dots {
            position: absolute;
            bottom: 20px; /* ✅ Resmin hemen altına değil, resmin üzerine gelecek */
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            justify-content: center;
            align-items: center;
            z-index: 5;
        }
        
        .dot {
            width: 10px;
            height: 10px;
            border-radius: 50%;
            background: rgba(255, 255, 255, 0.5); /* ✅ Resim üzerinde görünür hale getir */
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .dot.active {
            background: #fff;
            width: 26px;
            border-radius: 5px;
        }
        
        .dot:hover {
            background: rgba(255, 255, 255, 0.8);
        }


        @media (max-width: 1024px) {
            .page-header {
                padding: 120px 40px 40px 40px;
            }

            .page-title {
                font-size: 48px;
            }

            .page-subtitle {
                font-size: 18px;
            }

            .designs-container {
                padding: 0 40px 120px 40px;
            }

            .project-title {
                font-size: 24px;
            }

        }
    </style>
</head>

    <script src="components/loader.js"></script>
    <script>
        // Initialize carousels
        const carousels = [
          { id: 'carousel1', dots: 'dots1' },
          { id: 'carousel2', dots: 'dots2' },
          { id: 'carousel3', dots: 'dots3' },
          { id: 'carousel4', dots: 'dots4' },
          { id: 'carousel5', dots: 'dots5' },
          { id: 'carousel6', dots: 'dots6' }
        ];
        
        carousels.forEach(carousel => {
            const wrapper = document.getElementById(carousel.id);
            const slides = wrapper.querySelectorAll('.design-slide');
            const slideCount = slides.length; // ✅ otomatik tespit et
            const dotsContainer = document.getElementById(carousel.dots);
            let currentIndex = 0;
            let startX = 0;
            let isDragging = false;
        
            // ✅ Otomatik dot oluştur
            for (let i = 0; i < slideCount; i++) {
                const dot = document.createElement('div');
                dot.className = 'dot' + (i === 0 ? ' active' : '');
                dot.addEventListener('click', () => goToSlide(i));
                dotsContainer.appendChild(dot);
            }
        
            function goToSlide(index) {
                currentIndex = index;
                wrapper.style.transform = `translateX(-${currentIndex * 100}%)`;
                updateDots();
            }
        
            function updateDots() {
                const dots = dotsContainer.querySelectorAll('.dot');
                dots.forEach((dot, index) => {
                    dot.classList.toggle('active', index === currentIndex);
                });
            }
        
            // ✅ Dokunma / sürükleme desteği aynı kalıyor
            wrapper.addEventListener('mousedown', startDrag);
            wrapper.addEventListener('touchstart', startDrag);
            wrapper.addEventListener('mousemove', drag);
            wrapper.addEventListener('touchmove', drag);
            wrapper.addEventListener('mouseup', endDrag);
            wrapper.addEventListener('touchend', endDrag);
            wrapper.addEventListener('mouseleave', endDrag);
        
            function startDrag(e) {
                isDragging = true;
                startX = e.type.includes('mouse') ? e.pageX : e.touches[0].pageX;
            }
        
            function drag(e) {
                if (!isDragging) return;
                e.preventDefault();
            }
        
            function endDrag(e) {
                if (!isDragging) return;
                isDragging = false;
                const endX = e.type.includes('mouse') ? e.pageX : e.changedTouches[0].pageX;
                const diff = startX - endX;
        
                if (Math.abs(diff) > 50) {
                    if (diff > 0 && currentIndex < slideCount - 1) {
                        goToSlide(currentIndex + 1);
                    } else if (diff < 0 && currentIndex > 0) {
                        goToSlide(currentIndex - 1);
                    }
                }
            }
        });

    </script>
