                tr: { title: 'Erişilebilirlik İzni', text: '<ul><li><strong>Sistem Ayarları → Gizlilik ve Güvenlik → Erişilebilirlik</strong> yolunu takip edin.</li><li><strong>+</strong> butonuna tıklayarak yeni bir uygulama ekleyin.</li><li>Uygulamalar klasörüne gidin, <strong>MouseKit</strong>\'i seçin ve Aç\'a tıklayın.</li><li>MouseKit\'in yanındaki anahtarı etkinleştirin.</li><li>Bu izin, kaydırma yönü kontrolü ve buton atamaları için gereklidir.</li></ul>' },
                de: { title: 'Bedienungshilfen-Berechtigung', text: '<ul><li>Gehen Sie zu <strong>Systemeinstellungen → Datenschutz & Sicherheit → Bedienungshilfen</strong>.</li><li>Klicken Sie auf <strong>+</strong>, um eine neue App hinzuzufügen.</li><li>Navigieren Sie zu Programme, wählen Sie <strong>MouseKit</strong> und klicken Sie auf Öffnen.</li><li>Aktivieren Sie den Schalter neben MouseKit.</li><li>Diese Berechtigung ist für Scrollrichtungssteuerung und Tastenbelegung erforderlich.</li></ul>' },
                fr: { title: 'Permission Accessibilité', text: '<ul><li>Allez dans <strong>Réglages Système → Confidentialité et sécurité → Accessibilité</strong>.</li><li>Cliquez sur <strong>+</strong> pour ajouter une nouvelle app.</li><li>Naviguez jusqu\'aux Applications, sélectionnez <strong>MouseKit</strong> et cliquez sur Ouvrir.</li><li>Activez le bouton bascule à côté de MouseKit.</li><li>Cette permission est requise pour le contrôle de la direction de défilement et la réaffectation des boutons.</li></ul>' },
                es: { title: 'Permiso de Accesibilidad', text: '<ul><li>Ve a <strong>Configuración del Sistema → Privacidad y Seguridad → Accesibilidad</strong>.</li><li>Haz clic en <strong>+</strong> para agregar una nueva app.</li><li>Navega a Aplicaciones, selecciona <strong>MouseKit</strong> y haz clic en Abrir.</li><li>Activa el interruptor junto a MouseKit.</li><li>Este permiso es necesario para el control de la dirección de desplazamiento y la reasignación de botones.</li></ul>' },
                pt: { title: 'Permissão de Acessibilidade', text: '<ul><li>Vá em <strong>Configurações do Sistema → Privacidade e Segurança → Acessibilidade</strong>.</li><li>Clique no <strong>+</strong> para adicionar um novo app.</li><li>Navegue até Aplicativos, selecione <strong>MouseKit</strong> e clique em Abrir.</li><li>Ative a chave ao lado do MouseKit.</li><li>Esta permissão é necessária para controle de direção de rolagem e remapeamento de botões.</li></ul>' },
                it: { title: 'Permesso Accessibilità', text: '<ul><li>Vai in <strong>Impostazioni di Sistema → Privacy e Sicurezza → Accessibilità</strong>.</li><li>Clicca su <strong>+</strong> per aggiungere una nuova app.</li><li>Naviga in Applicazioni, seleziona <strong>MouseKit</strong> e clicca su Apri.</li><li>Attiva il toggle accanto a MouseKit.</li><li>Questo permesso è necessario per il controllo della direzione di scorrimento e la rimappatura dei pulsanti.</li></ul>' },
                nl: { title: 'Toegankelijkheidstoestemming', text: '<ul><li>Ga naar <strong>Systeeminstellingen → Privacy & Beveiliging → Toegankelijkheid</strong>.</li><li>Klik op <strong>+</strong> om een nieuwe app toe te voegen.</li><li>Navigeer naar Programma\'s, selecteer <strong>MouseKit</strong> en klik op Open.</li><li>Schakel de schakelaar naast MouseKit in.</li><li>Deze toestemming is vereist voor scrollrichtingsbediening en knoptoewijzing.</li></ul>' },
                ru: { title: 'Разрешение на доступ', text: '<ul><li>Перейдите в <strong>Системные настройки → Конфиденциальность и безопасность → Универсальный доступ</strong>.</li><li>Нажмите <strong>+</strong>, чтобы добавить новое приложение.</li><li>Перейдите в Программы, выберите <strong>MouseKit</strong> и нажмите Открыть.</li><li>Включите переключатель рядом с MouseKit.</li><li>Это разрешение необходимо для управления направлением прокрутки и назначения кнопок.</li></ul>' },
                ja: { title: 'アクセシビリティ許可', text: '<ul><li><strong>システム設定 → プライバシーとセキュリティ → アクセシビリティ</strong>に移動します。</li><li><strong>+</strong>をクリックして新しいアプリを追加します。</li><li>アプリケーションフォルダに移動し、<strong>MouseKit</strong>を選択してOpenをクリックします。</li><li>MouseKitのトグルを有効にします。</li><li>この許可はスクロール方向制御とボタンの割り当てに必要です。</li></ul>' },
                ko: { title: '손쉬운 사용 권한', text: '<ul><li><strong>시스템 설정 → 개인 정보 보호 및 보안 → 손쉬운 사용</strong>으로 이동합니다.</li><li><strong>+</strong>를 클릭하여 새 앱을 추가합니다.</li><li>응용 프로그램으로 이동하여 <strong>MouseKit</strong>을 선택하고 열기를 클릭합니다.</li><li>MouseKit 옆의 토글을 활성화합니다.</li><li>이 권한은 스크롤 방향 제어 및 버튼 재매핑에 필요합니다.</li></ul>' },
                zh: { title: '辅助功能权限', text: '<ul><li>前往<strong>系统设置 → 隐私与安全性 → 辅助功能</strong>。</li><li>点击<strong>+</strong>添加新应用。</li><li>导航到应用程序，选择<strong>MouseKit</strong>并点击打开。</li><li>启用MouseKit旁边的开关。</li><li>此权限用于滚动方向控制和按钮重新映射。</li></ul>' },
                ar: { title: 'إذن إمكانية الوصول', text: '<ul><li>انتقل إلى <strong>إعدادات النظام ← الخصوصية والأمان ← إمكانية الوصول</strong>.</li><li>انقر على <strong>+</strong> لإضافة تطبيق جديد.</li><li>انتقل إلى التطبيقات، اختر <strong>MouseKit</strong> وانقر على فتح.</li><li>قم بتفعيل المفتاح بجانب MouseKit.</li><li>هذا الإذن مطلوب للتحكم في اتجاه التمرير وإعادة تعيين الأزرار.</li></ul>' },
                pl: { title: 'Uprawnienie Dostępności', text: '<ul><li>Przejdź do <strong>Ustawienia systemowe → Prywatność i bezpieczeństwo → Dostępność</strong>.</li><li>Kliknij <strong>+</strong>, aby dodać nową aplikację.</li><li>Przejdź do Aplikacje, wybierz <strong>MouseKit</strong> i kliknij Otwórz.</li><li>Włącz przełącznik obok MouseKit.</li><li>To uprawnienie jest wymagane do sterowania kierunkiem przewijania i przypisywania przycisków.</li></ul>' },
                sv: { title: 'Tillgänglighetsbehörighet', text: '<ul><li>Gå till <strong>Systeminställningar → Sekretess och säkerhet → Tillgänglighet</strong>.</li><li>Klicka på <strong>+</strong> för att lägga till en ny app.</li><li>Navigera till Program, välj <strong>MouseKit</strong> och klicka på Öppna.</li><li>Aktivera reglaget bredvid MouseKit.</li><li>Denna behörighet krävs för scrollriktningskontroll och knappomtilldelning.</li></ul>' },
            }
        },
        {
            imgs: ['assets/app3/loginAppAdd-46.png','assets/app3/loginAppSettings-48.png'],
            content: {
                en: { title: 'Launch at Login', text: '<ul><li>Enable the <strong>Launch at Login</strong> toggle in the app to start MouseKit automatically when your Mac boots.</li><li>You can also manage this in <strong>System Settings → General → Login Items</strong>.</li></ul>' },
                tr: { title: 'Girişte Başlat', text: '<ul><li>Mac\'iniz açıldığında MouseKit\'in otomatik olarak başlaması için uygulamadaki <strong>Girişte Başlat</strong> anahtarını etkinleştirin.</li><li>Bunu ayrıca <strong>Sistem Ayarları → Genel → Giriş Öğeleri</strong> bölümünden de yönetebilirsiniz.</li></ul>' },
                de: { title: 'Bei Anmeldung starten', text: '<ul><li>Aktivieren Sie den Schalter <strong>Bei Anmeldung starten</strong> in der App, damit MouseKit beim Start des Macs automatisch gestartet wird.</li><li>Dies können Sie auch unter <strong>Systemeinstellungen → Allgemein → Anmeldeobjekte</strong> verwalten.</li></ul>' },
                fr: { title: 'Démarrage à l\'ouverture de session', text: '<ul><li>Activez le bouton <strong>Démarrage à l\'ouverture de session</strong> pour démarrer MouseKit automatiquement au démarrage de votre Mac.</li><li>Vous pouvez également gérer cela dans <strong>Réglages Système → Général → Éléments d\'ouverture de session</strong>.</li></ul>' },
                es: { title: 'Iniciar al iniciar sesión', text: '<ul><li>Activa el interruptor <strong>Iniciar al iniciar sesión</strong> para que MouseKit se inicie automáticamente cuando enciendas tu Mac.</li><li>También puedes gestionar esto en <strong>Configuración del Sistema → General → Elementos de inicio de sesión</strong>.</li></ul>' },
                pt: { title: 'Iniciar no Login', text: '<ul><li>Ative o botão <strong>Iniciar no Login</strong> para que o MouseKit inicie automaticamente quando seu Mac ligar.</li><li>Você também pode gerenciar isso em <strong>Configurações do Sistema → Geral → Itens de Login</strong>.</li></ul>' },
                it: { title: 'Avvia all\'accesso', text: '<ul><li>Attiva il toggle <strong>Avvia all\'accesso</strong> nell\'app per avviare automaticamente MouseKit all\'avvio del Mac.</li><li>Puoi anche gestirlo in <strong>Impostazioni di Sistema → Generale → Elementi di accesso</strong>.</li></ul>' },
                nl: { title: 'Starten bij inloggen', text: '<ul><li>Schakel de schakelaar <strong>Starten bij inloggen</strong> in om MouseKit automatisch te starten wanneer je Mac opstart.</li><li>Je kunt dit ook beheren in <strong>Systeeminstellingen → Algemeen → Aanmeldingsitems</strong>.</li></ul>' },
                ru: { title: 'Автозапуск', text: '<ul><li>Включите переключатель <strong>Автозапуск</strong> в приложении, чтобы MouseKit запускался автоматически при загрузке Mac.</li><li>Вы также можете управлять этим в <strong>Системные настройки → Основные → Объекты входа</strong>.</li></ul>' },
                ja: { title: 'ログイン時に起動', text: '<ul><li>アプリの<strong>ログイン時に起動</strong>トグルを有効にすると、Macの起動時にMouseKitが自動的に起動します。</li><li><strong>システム設定 → 一般 → ログイン項目</strong>でも管理できます。</li></ul>' },
                ko: { title: '로그인 시 시작', text: '<ul><li>앱의 <strong>로그인 시 시작</strong> 토글을 활성화하면 Mac이 부팅될 때 MouseKit이 자동으로 시작됩니다.</li><li><strong>시스템 설정 → 일반 → 로그인 항목</strong>에서도 관리할 수 있습니다.</li></ul>' },
                zh: { title: '登录时启动', text: '<ul><li>启用应用中的<strong>登录时启动</strong>开关，使MouseKit在Mac启动时自动运行。</li><li>您也可以在<strong>系统设置 → 通用 → 登录项目</strong>中管理此设置。</li></ul>' },
                ar: { title: 'التشغيل عند تسجيل الدخول', text: '<ul><li>قم بتفعيل خيار <strong>التشغيل عند تسجيل الدخول</strong> في التطبيق ليبدأ MouseKit تلقائياً عند تشغيل Mac.</li><li>يمكنك أيضاً إدارة ذلك من <strong>إعدادات النظام ← عام ← عناصر تسجيل الدخول</strong>.</li></ul>' },
                pl: { title: 'Uruchamianie przy logowaniu', text: '<ul><li>Włącz przełącznik <strong>Uruchamianie przy logowaniu</strong> w aplikacji, aby MouseKit uruchamiał się automatycznie po uruchomieniu Maca.</li><li>Możesz to również zarządzać w <strong>Ustawienia systemowe → Ogólne → Elementy logowania</strong>.</li></ul>' },
                sv: { title: 'Starta vid inloggning', text: '<ul><li>Aktivera reglaget <strong>Starta vid inloggning</strong> i appen för att starta MouseKit automatiskt när din Mac startar.</li><li>Du kan också hantera detta i <strong>Systeminställningar → Allmänt → Inloggningsobjekt</strong>.</li></ul>' },
            }
        },
        {
            imgs: ['assets/app3/naturalScroll-50.png'],
            content: {
                en: { title: 'Natural Scroll', text: '<ul><li>Toggle <strong>Natural Scroll</strong> to sync your mouse scroll direction with your trackpad.</li><li>When enabled, scrolling behavior matches macOS trackpad natural scroll.</li><li>When disabled, scroll direction is reversed (traditional).</li></ul>' },
                tr: { title: 'Doğal Kaydırma Yönü', text: '<ul><li><strong>Natural Scroll</strong> anahtarını açarak fare kaydırma yönünüzü trackpad ile senkronize edin.</li><li>Etkinleştirildiğinde, kaydırma davranışı macOS trackpad\'in doğal kaydırmasıyla eşleşir.</li><li>Devre dışı bırakıldığında, kaydırma yönü tersine döner (geleneksel).</li></ul>' },
                de: { title: 'Natürliches Scrollen', text: '<ul><li>Aktivieren Sie <strong>Natürliches Scrollen</strong>, um die Scrollrichtung der Maus mit dem Trackpad zu synchronisieren.</li><li>Wenn aktiviert, entspricht das Scrollverhalten dem natürlichen Scrollen des macOS-Trackpads.</li><li>Wenn deaktiviert, ist die Scrollrichtung umgekehrt (traditionell).</li></ul>' },
                fr: { title: 'Défilement naturel', text: '<ul><li>Activez le <strong>Défilement naturel</strong> pour synchroniser la direction de défilement de votre souris avec le trackpad.</li><li>Quand activé, le comportement de défilement correspond au défilement naturel du trackpad macOS.</li><li>Quand désactivé, la direction de défilement est inversée (traditionnel).</li></ul>' },
                es: { title: 'Desplazamiento natural', text: '<ul><li>Activa el <strong>Desplazamiento natural</strong> para sincronizar la dirección de desplazamiento del ratón con el trackpad.</li><li>Cuando está activado, el comportamiento de desplazamiento coincide con el desplazamiento natural del trackpad de macOS.</li><li>Cuando está desactivado, la dirección se invierte (tradicional).</li></ul>' },
                pt: { title: 'Rolagem Natural', text: '<ul><li>Ative a <strong>Rolagem Natural</strong> para sincronizar a direção de rolagem do mouse com o trackpad.</li><li>Quando ativada, o comportamento de rolagem corresponde ao trackpad natural do macOS.</li><li>Quando desativada, a direção é invertida (tradicional).</li></ul>' },
                it: { title: 'Scorrimento naturale', text: '<ul><li>Attiva lo <strong>Scorrimento naturale</strong> per sincronizzare la direzione di scorrimento del mouse con il trackpad.</li><li>Quando abilitato, il comportamento corrisponde allo scorrimento naturale del trackpad macOS.</li><li>Quando disabilitato, la direzione è invertita (tradizionale).</li></ul>' },
                nl: { title: 'Natuurlijk scrollen', text: '<ul><li>Schakel <strong>Natuurlijk scrollen</strong> in om de scrollrichting van de muis te synchroniseren met het trackpad.</li><li>Ingeschakeld: scrollgedrag komt overeen met het natuurlijk scrollen van het macOS-trackpad.</li><li>Uitgeschakeld: scrollrichting is omgekeerd (traditioneel).</li></ul>' },
                ru: { title: 'Естественная прокрутка', text: '<ul><li>Включите <strong>Естественную прокрутку</strong>, чтобы синхронизировать направление прокрутки мыши с трекпадом.</li><li>При включении поведение прокрутки соответствует естественной прокрутке трекпада macOS.</li><li>При отключении направление прокрутки инвертируется (традиционное).</li></ul>' },
                ja: { title: 'ナチュラルスクロール', text: '<ul><li><strong>ナチュラルスクロール</strong>をオンにして、マウスのスクロール方向をトラックパッドと同期します。</li><li>有効時はmacOSトラックパッドのナチュラルスクロールと同じ動作になります。</li><li>無効時はスクロール方向が逆になります（従来型）。</li></ul>' },
                ko: { title: '자연스러운 스크롤', text: '<ul><li><strong>자연스러운 스크롤</strong>을 켜서 마우스 스크롤 방향을 트랙패드와 동기화합니다.</li><li>활성화 시 macOS 트랙패드의 자연스러운 스크롤과 동일하게 작동합니다.</li><li>비활성화 시 스크롤 방향이 반대로 됩니다 (전통적 방식).</li></ul>' },
                zh: { title: '自然滚动', text: '<ul><li>开启<strong>自然滚动</strong>，将鼠标滚动方向与触控板同步。</li><li>启用时，滚动行为与macOS触控板的自然滚动一致。</li><li>禁用时，滚动方向相反（传统模式）。</li></ul>' },
                ar: { title: 'التمرير الطبيعي', text: '<ul><li>قم بتفعيل <strong>التمرير الطبيعي</strong> لمزامنة اتجاه تمرير الفأرة مع لوحة التتبع.</li><li>عند التفعيل، يتطابق سلوك التمرير مع التمرير الطبيعي للوحة التتبع في macOS.</li><li>عند التعطيل، يكون اتجاه التمرير معكوساً (تقليدي).</li></ul>' },
                pl: { title: 'Naturalne przewijanie', text: '<ul><li>Włącz <strong>Naturalne przewijanie</strong>, aby zsynchronizować kierunek przewijania myszy z gładzikiem.</li><li>Po włączeniu zachowanie przewijania odpowiada naturalnemu przewijaniu gładzikiem macOS.</li><li>Po wyłączeniu kierunek jest odwrócony (tradycyjny).</li></ul>' },
                sv: { title: 'Naturlig scrollning', text: '<ul><li>Aktivera <strong>Naturlig scrollning</strong> för att synkronisera musens scrollriktning med styrplattan.</li><li>När aktiverat matchar scrollbeteendet macOS styrplattans naturliga scrollning.</li><li>När inaktiverat är scrollriktningen omvänd (traditionell).</li></ul>' },
            }
        },
        {
            imgs: ['assets/app3/profileA-52.png','assets/app3/ProfileAFinal-54.png','assets/app3/customProfileA-56.png'],
            content: {
                en: { title: 'Button Customizations', text: '<ul><li>Click <strong>Customizations</strong> in the app to open the Button Assignments panel.</li><li>Choose from <strong>Profile A</strong>, <strong>Default</strong>, or <strong>Profile B</strong>.</li><li>Click any mouse button on the diagram, then select a keyboard shortcut to assign.</li><li>Each profile stores independent button mappings so you can switch between layouts instantly.</li></ul>' },
                tr: { title: 'Buton Özelleştirmeleri', text: '<ul><li>Buton atama panelini açmak için uygulamada <strong>Özelleştirmeler</strong>\'e tıklayın.</li><li><strong>Profil A</strong>, <strong>Varsayılan</strong> veya <strong>Profil B</strong>\'den birini seçin.</li><li>Diyagramdaki herhangi bir fare düğmesine tıklayın, ardından atamak istediğiniz klavye kısayolunu seçin.</li><li>Her profil bağımsız buton atamaları saklar; böylece anında düzenler arasında geçiş yapabilirsiniz.</li></ul>' },
                de: { title: 'Tastenbelegung', text: '<ul><li>Klicken Sie in der App auf <strong>Anpassungen</strong>, um das Panel für Tastenbelegungen zu öffnen.</li><li>Wählen Sie zwischen <strong>Profil A</strong>, <strong>Standard</strong> oder <strong>Profil B</strong>.</li><li>Klicken Sie auf eine beliebige Maustaste im Diagramm und wählen Sie ein Tastaturkürzel.</li><li>Jedes Profil speichert unabhängige Tastenbelegungen für schnellen Wechsel.</li></ul>' },
                fr: { title: 'Personnalisation des boutons', text: '<ul><li>Cliquez sur <strong>Personnalisations</strong> pour ouvrir le panneau d\'affectation des boutons.</li><li>Choisissez entre <strong>Profil A</strong>, <strong>Défaut</strong> ou <strong>Profil B</strong>.</li><li>Cliquez sur n\'importe quel bouton de la souris dans le diagramme, puis sélectionnez un raccourci clavier.</li><li>Chaque profil stocke des affectations indépendantes pour basculer instantanément.</li></ul>' },
                es: { title: 'Personalización de botones', text: '<ul><li>Haz clic en <strong>Personalizaciones</strong> para abrir el panel de asignación de botones.</li><li>Elige entre <strong>Perfil A</strong>, <strong>Predeterminado</strong> o <strong>Perfil B</strong>.</li><li>Haz clic en cualquier botón del diagrama y selecciona un atajo de teclado.</li><li>Cada perfil almacena asignaciones independientes para cambiar entre ellas al instante.</li></ul>' },
                pt: { title: 'Personalização de botões', text: '<ul><li>Clique em <strong>Personalizações</strong> para abrir o painel de atribuição de botões.</li><li>Escolha entre <strong>Perfil A</strong>, <strong>Padrão</strong> ou <strong>Perfil B</strong>.</li><li>Clique em qualquer botão do mouse no diagrama e selecione um atalho de teclado.</li><li>Cada perfil armazena atribuições independentes para alternar entre layouts instantaneamente.</li></ul>' },
                it: { title: 'Personalizzazione pulsanti', text: '<ul><li>Clicca su <strong>Personalizzazioni</strong> per aprire il pannello di assegnazione pulsanti.</li><li>Scegli tra <strong>Profilo A</strong>, <strong>Predefinito</strong> o <strong>Profilo B</strong>.</li><li>Clicca su qualsiasi pulsante nel diagramma e seleziona una scorciatoia da tastiera.</li><li>Ogni profilo memorizza assegnazioni indipendenti per cambiare layout istantaneamente.</li></ul>' },
                nl: { title: 'Knoppeninstellingen', text: '<ul><li>Klik op <strong>Aanpassingen</strong> om het knoptoewijzingspaneel te openen.</li><li>Kies tussen <strong>Profiel A</strong>, <strong>Standaard</strong> of <strong>Profiel B</strong>.</li><li>Klik op een muisknop in het diagram en selecteer een sneltoets.</li><li>Elk profiel slaat onafhankelijke toewijzingen op voor direct schakelen.</li></ul>' },
                ru: { title: 'Настройка кнопок', text: '<ul><li>Нажмите <strong>Настройки</strong> в приложении, чтобы открыть панель назначения кнопок.</li><li>Выберите <strong>Профиль A</strong>, <strong>По умолчанию</strong> или <strong>Профиль B</strong>.</li><li>Нажмите на любую кнопку мыши на схеме и выберите сочетание клавиш.</li><li>Каждый профиль хранит независимые назначения для мгновенного переключения.</li></ul>' },

    const headingLabels = { en:'Instructions', tr:'Talimatlar', de:'Anleitung', fr:'Instructions', es:'Instrucciones', pt:'Instruções', it:'Istruzioni', nl:'Instructies', ru:'Инструкции', ja:'使い方', ko:'사용 방법', zh:'使用说明', ar:'التعليمات', pl:'Instrukcje', sv:'Instruktioner' };

    let currentLang = 'en';

    function buildAccordion(lang) {
        const container = document.getElementById('accordion');
        container.innerHTML = '';
        sections.forEach((s, i) => {
            const c = s.content[lang] || s.content['en'];
            const item = document.createElement('div');
            item.className = 'accordion-item';
            const imgs = s.imgs.map(src => `<img src="${src}" loading="lazy">`).join('');
            item.innerHTML = `
                <button class="accordion-btn" onclick="toggleItem(this)">
                    <span class="accordion-btn-left">
                        <span class="accordion-num">${String(i+1).padStart(2,'0')}</span>
                        <span class="accordion-label">${c.title}</span>
                    </span>
                    <svg class="accordion-arrow" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <polyline points="6 9 12 15 18 9"/>
                    </svg>
                </button>
                <div class="accordion-body">
                    <div class="accordion-text">${c.text}</div>
                    <div class="accordion-imgs">${imgs}</div>
                </div>`;
            container.appendChild(item);
        });
    }

    function toggleItem(btn) {
        const item = btn.closest('.accordion-item');
        const isOpen = item.classList.contains('open');
        document.querySelectorAll('.accordion-item.open').forEach(el => el.classList.remove('open'));
        if (!isOpen) item.classList.add('open');
    }

    function setLang(lang) {
        currentLang = lang;
        document.getElementById('instr-heading').textContent = headingLabels[lang] || 'Instructions';
        buildAccordion(lang);
    }

    buildAccordion('en');
    </script>
